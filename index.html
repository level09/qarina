<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Qarina</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='44 38 180 180'%3E%3Ccircle fill='%23dd4c3a' cx='133.93' cy='75.94' r='32'/%3E%3Ccircle fill='%23efb13e' cx='90.17' cy='153.75' r='32'/%3E%3Ccircle fill='%2352a156' cx='178.17' cy='153.76' r='32'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.20.0/dist/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f8fafd;
    --surface: #ffffff;
    --surface2: #f1f3f4;
    --surface3: #eef3fb;
    --border: #dadce0;
    --border-light: #e8eaed;
    --text: #202124;
    --text2: #5f6368;
    --text3: #80868b;
    --accent: #1a73e8;
    --accent-bg: #e8f0fe;
    --green: #188038;
    --green-bg: #e6f4ea;
    --amber: #b06000;
    --amber-bg: #fef7e0;
    --red: #d93025;
    --red-bg: #fce8e6;
    --blue: #1a73e8;
    --blue-bg: #e8f0fe;
    --pink: #c5221f;
    --pink-bg: #fce8e6;
    --cyan: #007b83;
    --cyan-bg: #e4f7fb;
    --violet: #5f6368;
    --violet-bg: #f1f3f4;
    --font-heading: 'Roboto', Arial, sans-serif;
    --font-body: 'Roboto', Arial, sans-serif;
    --font-reading: 'Roboto', Arial, sans-serif;
    --font-mono: 'Roboto Mono', ui-monospace, SFMono-Regular, monospace;
    --radius: 24px;
    --shadow: 0 1px 3px rgba(60, 64, 67, 0.18), 0 1px 2px rgba(60, 64, 67, 0.1);
    --shadow-sm: 0 1px 2px rgba(60, 64, 67, 0.16);
  }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 14px 24px;
    border-bottom: 1px solid var(--border-light);
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 20;
  }
  header .logo {
    width: 34px; height: 34px;
    display: block;
    flex-shrink: 0;
  }
  .home-link {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    color: inherit;
    text-decoration: none;
    border-radius: 999px;
  }
  .home-link:focus-visible {
    outline: 3px solid rgba(26, 115, 232, 0.16);
    outline-offset: 4px;
  }
  header h1 {
    font-family: var(--font-heading);
    font-size: 18px;
    font-weight: 500;
    letter-spacing: 0;
  }
  header .tag {
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 500;
    color: var(--accent);
    background: var(--accent-bg);
    padding: 5px 12px;
    border-radius: 20px;
    border: 0;
    margin-left: auto;
  }

  main {
    flex: 1;
    max-width: 1040px;
    width: 100%;
    margin: 0 auto;
    padding: 36px 24px 64px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  /* Search bar */
  .search-box { position: relative; }
  .search-box textarea {
    width: 100%;
    min-height: 76px;
    max-height: 200px;
    padding: 20px 72px 20px 24px;
    background: var(--surface);
    border: 1px solid var(--border-light);
    border-radius: 30px;
    box-shadow: var(--shadow);
    color: var(--text);
    font-size: 16px;
    font-family: var(--font-body);
    line-height: 1.55;
    resize: none;
    overflow-y: auto;
    outline: none;
    transition: border-color 0.16s, box-shadow 0.16s, background 0.16s;
  }
  .search-box textarea:focus {
    border-color: color-mix(in srgb, var(--accent) 55%, var(--border));
    box-shadow: 0 1px 6px rgba(60, 64, 67, 0.22), 0 0 0 3px rgba(26, 115, 232, 0.12);
    background: #fff;
  }
  .search-box textarea::placeholder { color: var(--text3); }
  .search-box button {
    position: absolute;
    right: 16px;
    bottom: 16px;
    width: 44px; height: 44px;
    background: var(--accent);
    border: 0;
    border-radius: 50%;
    box-shadow: none;
    color: #fff;
    cursor: pointer;
    display: grid; place-items: center;
    transition: background 0.12s, transform 0.12s;
    font-size: 21px;
  }
  .search-box button:hover:not(:disabled) {
    background: #1558b0;
  }
  .search-box button:active:not(:disabled) {
    transform: scale(0.96);
  }
  .search-box button:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Tab bar */
  .tab-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 4px;
  }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab-bar:empty { display: none; }

  .tab {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
    background: var(--surface);
    border: 1px solid var(--border-light);
    border-radius: 18px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    white-space: nowrap;
    max-width: 260px;
    flex-shrink: 0;
  }
  .tab:hover { background: var(--surface2); }
  .tab.active {
    color: var(--accent);
    border-color: transparent;
    background: var(--accent-bg);
    font-weight: 600;
  }
  .tab .tab-label {
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 150px;
  }
  .tab .tab-status {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .tab .tab-status.running {
    background: var(--amber);
    animation: pulse 1.3s ease infinite;
  }
  .tab .tab-status.done { background: var(--green); }
  .tab .tab-status.error { background: var(--red); }
  .tab .tab-status.stopped { background: var(--text3); }
  .tab .tab-close {
    width: 16px; height: 16px;
    display: grid; place-items: center;
    border-radius: 50%;
    font-size: 14px;
    line-height: 1;
    color: var(--text2);
    flex-shrink: 0;
    transition: all 0.1s;
  }
  .tab .tab-close:hover { background: var(--red-bg); color: var(--red); }
  .tab-new {
    width: 32px; height: 32px;
    display: grid; place-items: center;
    background: var(--surface);
    border: 1px dashed var(--border);
    border-radius: 50%;
    cursor: pointer;
    color: var(--text2);
    font-size: 16px;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .tab-new:hover { border-color: var(--accent); color: var(--accent); }

  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  @keyframes liveSlide {
    0% { transform: translateX(-110%); }
    55%, 100% { transform: translateX(230%); }
  }
  @keyframes liveAppend {
    0% { opacity: 0; transform: translateY(8px); box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.08); }
    100% { opacity: 1; transform: translateY(0); box-shadow: none; }
  }

  /* Output panels */
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* Activity feed */
  .feed { display: flex; flex-direction: column; gap: 6px; }

  .live-status {
    position: sticky;
    top: 73px;
    z-index: 8;
    display: grid;
    grid-template-columns: auto 1fr auto auto;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
    padding: 11px 14px;
    background: rgba(255, 255, 255, 0.92);
    border: 1px solid var(--border-light);
    border-radius: 18px;
    box-shadow: 0 8px 24px rgba(60, 64, 67, 0.10);
    backdrop-filter: blur(14px);
  }
  .live-status .live-dot {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: var(--accent-bg);
    display: grid;
    place-items: center;
    color: var(--accent);
    position: relative;
    overflow: hidden;
  }
  .live-status .live-dot::after {
    content: "";
    position: absolute;
    inset: 7px;
    border-radius: 50%;
    border: 2px solid currentColor;
    border-top-color: transparent;
    animation: spin 0.9s linear infinite;
  }
  .live-status .live-copy {
    min-width: 0;
  }
  .live-status .live-title {
    color: var(--text);
    font-size: 13px;
    font-weight: 600;
    line-height: 1.35;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .live-status .live-meta {
    color: var(--text2);
    font-size: 11px;
    line-height: 1.45;
  }
  .live-status .live-meter {
    width: 86px;
    height: 4px;
    border-radius: 999px;
    background: var(--surface2);
    overflow: hidden;
  }
  .live-status .live-meter span {
    display: block;
    width: 46%;
    height: 100%;
    border-radius: inherit;
    background: var(--accent);
    animation: liveSlide 1.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
  }
  .live-status.error .live-dot {
    background: var(--red-bg);
    color: var(--red);
  }
  .live-status.error .live-dot::after {
    content: none;
  }
  .live-status.error .live-dot::before {
    content: "!";
    font-weight: 700;
    font-size: 15px;
  }
  .live-status.error .live-meter span {
    background: var(--red);
    animation: none;
    transform: none;
    width: 100%;
  }
  .live-status.stopped .live-dot {
    background: var(--surface2);
    color: var(--text2);
  }
  .live-status.stopped .live-dot::after {
    content: none;
  }
  .live-status.stopped .live-meter span {
    background: var(--text3);
    animation: none;
    transform: none;
    width: 100%;
  }
  .live-status .stop-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    min-height: 30px;
    padding: 5px 12px;
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 500;
    color: var(--text2);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.1s;
  }
  .live-status .stop-btn:hover:not(:disabled) {
    border-color: var(--red);
    color: var(--red);
    background: var(--red-bg);
  }
  .live-status .stop-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .live-status .stop-btn i { font-size: 14px; }
  .live-status.error .stop-btn,
  .live-status.stopped .stop-btn { display: none; }
  .live-added {
    animation: liveAppend 0.55s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .step {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 14px;
    background: var(--surface);
    border: 1px solid var(--border-light);
    border-left: 3px solid var(--border);
    border-radius: 14px;
    font-size: 13px;
    color: var(--text2);
    animation: fadeIn 0.2s ease;
  }
  .step .icon {
    width: 30px; height: 30px; flex-shrink: 0;
    border-radius: 50%;
    border: 0;
    display: grid; place-items: center;
    font-size: 16px;
  }
  .step:has(.icon.research) { border-left-color: var(--accent); }
  .step:has(.icon.images) { border-left-color: var(--pink); }
  .step:has(.icon.videos) { border-left-color: var(--red); }
  .step:has(.icon.news) { border-left-color: var(--amber); }
  .step:has(.icon.docs) { border-left-color: var(--cyan); }
  .step:has(.icon.read),
  .step:has(.icon.knowledge) { border-left-color: var(--green); }
  .step:has(.icon.err) { border-left-color: var(--red); }
  .step .icon.research   { background: var(--accent-bg); color: var(--accent); }
  .step .icon.images     { background: var(--pink-bg); color: var(--pink); }
  .step .icon.videos     { background: var(--red-bg); color: var(--red); }
  .step .icon.news       { background: var(--amber-bg); color: var(--amber); }
  .step .icon.docs       { background: var(--cyan-bg); color: var(--cyan); }
  .step .icon.read       { background: var(--green-bg); color: var(--green); }
  .step .icon.transcript { background: var(--blue-bg); color: var(--blue); }
  .step .icon.social     { background: var(--violet-bg); color: var(--violet); }
  .step .icon.think      { background: var(--surface2); color: var(--text2); }
  .step .icon.knowledge  { background: var(--green-bg); color: var(--green); }
  .step .icon.err        { background: var(--red-bg); color: var(--red); }
  .step .label { flex: 1; line-height: 1.5; word-break: break-word; }
  .step .label strong { color: var(--text); font-weight: 600; }

  /* Live media strips */
  .media-strip {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    scrollbar-width: thin;
    padding: 10px 0 12px;
    animation: fadeIn 0.3s ease;
  }
  .media-strip::-webkit-scrollbar { height: 4px; }
  .media-strip::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 2px; }
  .media-strip .media-card {
    flex-shrink: 0;
    width: 180px;
    background: var(--surface);
    border: 1px solid var(--border-light);
    border-radius: 16px;
    overflow: hidden;
    transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
    text-decoration: none;
    color: var(--text);
    position: relative;
  }
  .media-strip .media-card:hover {
    border-color: color-mix(in srgb, var(--accent) 45%, var(--border));
    box-shadow: var(--shadow-sm);
    transform: translateY(-1px);
  }
  .media-card .media-thumb {
    position: relative;
    width: 100%; height: 112px;
    overflow: hidden;
    background: var(--surface2);
    cursor: pointer;
  }
  .media-card .media-thumb img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  /* Overlay actions on hover */
  .media-card .media-actions {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(32,33,36,0.55);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .media-card:hover .media-actions { opacity: 1; }
  .media-actions .act-btn {
    width: 30px; height: 30px;
    display: grid; place-items: center;
    background: var(--surface);
    border: 0;
    border-radius: 50%;
    cursor: pointer;
    font-size: 14px;
    color: var(--text);
    transition: all 0.1s;
  }
  .media-actions .act-btn:hover { background: var(--accent-bg); color: var(--accent); }
  /* Duration badge */
  .media-card .badge {
    position: absolute;
    bottom: 4px; right: 4px;
    padding: 2px 6px;
    font-size: 10px;
    font-weight: 600;
    background: rgba(32,33,36,0.82);
    color: #fff;
    border-radius: 4px;
    pointer-events: none;
  }
  /* Source badge */
  .media-card .source-badge {
    position: absolute;
    top: 4px; left: 4px;
    padding: 2px 6px;
    font-size: 9px;
    font-weight: 600;
    background: rgba(32,33,36,0.76);
    color: #fff;
    border-radius: 4px;
    pointer-events: none;
    max-width: 120px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .media-card .media-title {
    padding: 8px 10px;
    font-size: 12px;
    line-height: 1.35;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    color: var(--text2);
  }
  .media-card .media-date {
    padding: 0 10px 8px;
    font-size: 11px;
    color: var(--text2);
    opacity: 0.7;
  }
  .media-strip.news-strip .media-card,
  .media-strip.docs-strip .media-card {
    width: 240px;
  }
  .media-strip.news-strip .media-thumb,
  .media-strip.docs-strip .media-thumb { display: none; }
  .media-strip.news-strip .media-card .media-actions,
  .media-strip.docs-strip .media-card .media-actions { display: none; }
  .media-strip.news-strip .media-title,
  .media-strip.docs-strip .media-title {
    padding: 10px 12px 4px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    -webkit-line-clamp: 3;
  }
  .media-strip.news-strip .media-date,
  .media-strip.docs-strip .media-date {
    padding: 2px 12px 10px;
  }
  .dossier-list {
    display: grid;
    gap: 10px;
    margin: 8px 0 12px;
    animation: fadeIn 0.3s ease;
  }
  .dossier-card {
    border: 1px solid var(--border-light);
    border-left: 3px solid var(--red);
    border-radius: 14px;
    background: var(--surface);
    padding: 14px;
  }
  .dossier-head {
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .dossier-icon {
    width: 30px;
    height: 30px;
    flex-shrink: 0;
    display: grid;
    place-items: center;
    border-radius: 50%;
    background: var(--red-bg);
    color: var(--red);
    border: 0;
  }
  .dossier-title {
    font-weight: 650;
    line-height: 1.35;
    color: var(--text);
  }
  .dossier-meta {
    margin-top: 3px;
    color: var(--text2);
    font-size: 11px;
  }
  .dossier-transcript {
    margin: 10px 0;
    padding: 9px 10px;
    background: var(--surface2);
    border-radius: 10px;
    color: var(--text2);
    font-family: var(--font-mono);
    font-size: 11px;
    line-height: 1.55;
    max-height: 110px;
    overflow: hidden;
    white-space: pre-wrap;
  }
  .dossier-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .dossier-actions button,
  .dossier-actions a {
    min-height: 30px;
    padding: 6px 9px;
    border: 1px solid var(--border-light);
    border-radius: 999px;
    background: var(--surface);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 11px;
    font-weight: 600;
    text-decoration: none;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .dossier-actions button:hover,
  .dossier-actions a:hover {
    border-color: color-mix(in srgb, var(--accent) 45%, var(--border));
    color: var(--accent);
    background: var(--accent-bg);
  }
  /* Copy toast */
  .copy-toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    padding: 8px 16px;
    background: #3c4043;
    color: #fff;
    font-size: 12px;
    font-weight: 500;
    border-radius: 999px;
    opacity: 0;
    transition: all 0.2s;
    pointer-events: none;
    z-index: 200;
  }
  .copy-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Lightbox */
  .lightbox {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 150;
    display: none;
    place-items: center;
    cursor: zoom-out;
  }
  .lightbox.open { display: grid; }
  .lightbox img {
    max-width: 90vw;
    max-height: 85vh;
    border-radius: 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .lightbox .lb-actions {
    position: fixed;
    bottom: 20px;
    display: flex;
    gap: 8px;
  }
  .lightbox .lb-btn {
    padding: 8px 14px;
    background: var(--surface);
    border: 0;
    border-radius: 999px;
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    color: var(--text);
    transition: all 0.1s;
  }
  .lightbox .lb-btn:hover { background: var(--accent-bg); color: var(--accent); }
  .lightbox .lb-btn i { font-size: 14px; }

  .media-section-label {
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text2);
    padding: 12px 0 2px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* Knowledge status */
  .step.knowledge-empty { opacity: 0.6; }
  .step .label .kb-hint {
    font-size: 11px;
    color: var(--text2);
    font-weight: 400;
  }

  /* Spinner */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 16px; height: 16px;
    border: 2.5px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: inline-block;
  }

  /* Report */
  .report {
    background: var(--surface);
    border: 1px solid var(--border-light);

</style>
</head>
<body>

<header>
  <a href="/" class="home-link" id="home-link" title="New research">
    <svg class="logo" viewBox="50 38 165 158" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <circle fill="#dd4c3a" cx="133.93" cy="75.94" r="32"/>
      <circle fill="#efb13e" cx="90.17" cy="153.75" r="32"/>
      <circle fill="#52a156" cx="178.17" cy="153.76" r="32"/>
    </svg>
    <h1>Qarina</h1>
  </a>
  <span class="tag" id="model-tag">ready</span>
  <button class="header-btn" id="history-btn" title="Research history"><i class="ti ti-history"></i></button>
</header>

<div class="lightbox" id="lightbox">
  <img id="lb-img" src="" alt="">
  <div class="lb-actions">
    <button class="lb-btn" id="lb-download"><i class="ti ti-download"></i> Download</button>
    <button class="lb-btn" id="lb-copy"><i class="ti ti-link"></i> Copy URL</button>
    <button class="lb-btn" id="lb-open"><i class="ti ti-external-link"></i> Open source</button>
  </div>
</div>
<div class="copy-toast" id="copy-toast">Copied to clipboard</div>

<div class="drawer-overlay" id="drawer-overlay">
  <div class="drawer" id="drawer">
    <div class="drawer-header">
      <i class="ti ti-history" style="font-size:18px;color:var(--accent)"></i>
      <h2>Research History</h2>
      <button class="drawer-close" id="drawer-close">&times;</button>
    </div>
    <div class="drawer-list" id="history-list">
      <div class="drawer-empty">No research sessions yet</div>
    </div>
  </div>
</div>

<main>
  <div class="search-box">
    <textarea id="query" rows="2" placeholder="What do you want to research?"></textarea>
    <button id="go" aria-label="Run research"><i class="ti ti-arrow-right"></i></button>
  </div>

  <div class="toggles">
    <label>Sources:</label>
    <span class="chip active" data-tool="images"><i class="ti ti-photo"></i> Images</span>
    <span class="chip active" data-tool="videos"><i class="ti ti-player-play"></i> Videos</span>
    <span class="chip active" data-tool="news"><i class="ti ti-news"></i> News</span>
    <span class="chip active" data-tool="docs"><i class="ti ti-file-text"></i> Documents</span>
    <span class="chip" data-tool="social"><i class="ti ti-brand-twitter"></i> X + Social</span>
    <div class="sep"></div>
    <select id="model-select">
      <option value="google/gemini-3.1-flash-lite">Gemini 3.1 Flash Lite</option>
      <option value="deepseek/deepseek-v4-flash">DeepSeek V4 Flash</option>
      <option value="deepseek/deepseek-v4-pro">DeepSeek V4 Pro</option>
      <option value="anthropic/claude-haiku-4.5">Claude Haiku 4.5</option>
    </select>
  </div>

  <div class="tab-bar" id="tab-bar"></div>

  <div id="panels">
    <div class="tab-panel active" id="panel-empty">
      <div class="empty">
        <div class="icon-big"><i class="ti ti-world-search"></i></div>
        <p><strong>Multi-source AI research</strong></p>
        <p>Web, images, videos, news, documents, X and social media</p>
      </div>
    </div>
  </div>
</main>

<script>
const $ = s => document.querySelector(s);
const queryEl = $('#query');
const btn = $('#go');
const tabBar = $('#tab-bar');
const panels = $('#panels');
const modelTag = $('#model-tag');

const TOOL_META = {
  web_research:         { ti: 'ti-search',          cls: 'research' },
  search_images:        { ti: 'ti-photo',            cls: 'images' },
  search_videos:        { ti: 'ti-player-play',      cls: 'videos' },
  search_news:          { ti: 'ti-news',             cls: 'news' },
  search_documents:     { ti: 'ti-file-text',        cls: 'docs' },
  read_page:            { ti: 'ti-book',             cls: 'read' },
  get_video_transcript: { ti: 'ti-message-language', cls: 'transcript' },
  analyze_video_url:    { ti: 'ti-file-analytics',   cls: 'videos' },
  search_social:        { ti: 'ti-brand-twitter',    cls: 'social' },
};

// --- Tab state ---
let tabs = [];
let activeTabId = null;
let nextTabId = 1;

function createTab(query, opts = {}) {
  const id = nextTabId++;
  const tab = {
    id,
    query,
    status: opts.status || 'running',
    sessionId: opts.sessionId || null,
    reportMd: '',
    gotReport: false,
    stopped: false,
    ws: null,
    eventCount: 0,
    lastActivityAt: Date.now(),
    liveText: 'Connecting...',
    liveTimer: null,
  };
  tabs.push(tab);

  // Create panel
  const panel = document.createElement('div');
  panel.className = 'tab-panel';
  panel.id = `panel-${id}`;

  if (!opts.skipStatus) {
    const status = document.createElement('div');
    status.className = 'live-status';
    status.id = `status-${id}`;
    status.innerHTML = `
      <div class="live-dot" aria-hidden="true"></div>
      <div class="live-copy">
        <div class="live-title">Connecting...</div>
        <div class="live-meta">Waiting for the first update.</div>
      </div>
      <button class="stop-btn" type="button" title="Stop research"><i class="ti ti-player-stop"></i> Stop</button>
      <div class="live-meter" aria-hidden="true"><span></span></div>
    `;
    panel.appendChild(status);
  }

  const feed = document.createElement('div');
  feed.className = 'feed';
  feed.id = `feed-${id}`;
  panel.appendChild(feed);

  panels.appendChild(panel);

  renderTabs();
  switchTab(id);
  saveTabs();
  return tab;
}

function renderTabs() {
  tabBar.innerHTML = '';
  tabs.forEach(t => {
    const el = document.createElement('div');
    el.className = 'tab' + (t.id === activeTabId ? ' active' : '');
    el.innerHTML = `
      <span class="tab-status ${t.status}"></span>
      <span class="tab-label">${escHtml(t.query)}</span>
      <span class="tab-close" data-id="${t.id}">&times;</span>
    `;
    el.addEventListener('click', (e) => {
      if (e.target.classList.contains('tab-close')) {
        closeTab(Number(e.target.dataset.id));
      } else {
        switchTab(t.id);
      }
    });
    tabBar.appendChild(el);
  });
}

function switchTab(id) {
  activeTabId = id;
  panels.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  const target = $(`#panel-${id}`);
  if (target) target.classList.add('active');
  const empty = $('#panel-empty');
  if (empty) empty.classList.remove('active');
  renderTabs();
  // Update URL without pushing history
  const tab = tabs.find(t => t.id === id);
  if (tab && tab.sessionId) {
    history.replaceState({ tabId: id, sessionId: tab.sessionId }, '', `/research/${tab.sessionId}`);
  } else {
    history.replaceState({ tabId: id }, '', '/');
  }
}

function closeTab(id) {
  const idx = tabs.findIndex(t => t.id === id);
  if (idx === -1) return;
  const tab = tabs[idx];
  if (tab.ws && tab.ws.readyState <= 1) tab.ws.close();
  stopLiveTimer(tab);
  const panel = $(`#panel-${id}`);
  if (panel) panel.remove();
  tabs.splice(idx, 1);

  if (tabs.length === 0) {
    activeTabId = null;
    const empty = $('#panel-empty');
    if (empty) empty.classList.add('active');
    history.replaceState(null, '', '/');
  } else if (activeTabId === id) {
    switchTab(tabs[Math.min(idx, tabs.length - 1)].id);
  }
  renderTabs();
  saveTabs();
}

function updateTabStatus(id, status) {
  const tab = tabs.find(t => t.id === id);
  if (tab) tab.status = status;
  renderTabs();
}

function showHome({ push = false } = {}) {
  tabs.forEach(tab => {
    if (tab.ws && tab.ws.readyState <= 1) tab.ws.close();
    stopLiveTimer(tab);
  });
  tabs = [];
  activeTabId = null;
  tabBar.innerHTML = '';
  panels.querySelectorAll('.tab-panel:not(#panel-empty)').forEach(p => p.remove());
  const empty = $('#panel-empty');
  if (empty) empty.classList.add('active');
  modelTag.textContent = 'ready';
  if (push) {
    history.pushState(null, '', '/');
  } else {
    history.replaceState(null, '', '/');
  }
  queryEl.focus();
}

function updateLiveStatus(tab) {
  const el = $(`#status-${tab.id}`);
  if (!el) return;
  const title = el.querySelector('.live-title');
  const meta = el.querySelector('.live-meta');
  if (title) title.textContent = tab.liveText || 'Researching...';
  if (meta) {
    if (tab.eventCount === 0) {
      meta.textContent = 'Waiting for the first update.';
      return;
    }
    const seconds = Math.max(0, Math.floor((Date.now() - tab.lastActivityAt) / 1000));
    const age = seconds < 2 ? 'just now' : `${seconds}s ago`;
    const updates = tab.eventCount === 1 ? '1 update appended' : `${tab.eventCount} updates appended`;
    meta.textContent = `${updates}. Last activity ${age}.`;
  }
}

function markLiveActivity(tab) {
  tab.eventCount += 1;
  tab.lastActivityAt = Date.now();
  updateLiveStatus(tab);
}

function startLiveTimer(tab) {
  stopLiveTimer(tab);
  tab.liveTimer = setInterval(() => updateLiveStatus(tab), 1000);
}

function stopLiveTimer(tab) {
  if (!tab.liveTimer) return;
  clearInterval(tab.liveTimer);
  tab.liveTimer = null;
}

// --- Research session ---
function go() {
  const q = queryEl.value.trim();
  if (!q) return;

  const tab = createTab(q);
  const id = tab.id;

  const setStatus = (text) => {
    tab.liveText = text;
    const el = $(`#status-${id}`);
    if (el) {
      const title = el.querySelector('.live-title');
      if (title) title.textContent = text;
    }
    updateLiveStatus(tab);
  };
  const getFeed = () => $(`#feed-${id}`);
  const appendToFeed = (node) => {
    const feed = getFeed();
    if (!feed) return;
    node.classList.add('live-added');
    feed.appendChild(node);
  };
  startLiveTimer(tab);

  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const ws = new WebSocket(`${proto}://${location.host}/ws`);
  tab.ws = ws;

  const stopBtn = $(`#status-${id} .stop-btn`);
  if (stopBtn) stopBtn.addEventListener('click', () => {
    if (ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'stop' }));
    stopBtn.disabled = true;
    setStatus('Stopping...');
  });

  ws.onopen = () => {
    ws.send(JSON.stringify({ query: q, config: getConfig() }));
    setStatus('Starting...');
  };

  ws.onmessage = (e) => {
    const ev = JSON.parse(e.data);
    markLiveActivity(tab);
    const feed = getFeed();
    if (!feed) return;

    if (ev.type === 'start') {
      modelTag.textContent = ev.model.split('/').pop();
    }

    if (ev.type === 'phase') {
      setStatus(ev.name);
    }

    if (ev.type === 'followups') {
      const box = document.createElement('div');
      box.className = 'info-box';
      box.innerHTML = '<div class="title"><i class="ti ti-help-circle"></i> Suggested focus areas</div><div class="followups-chips">' +
        ev.questions.map(q => `<span class="q-chip">${escHtml(q)}</span>`).join('') + '</div>';
      appendToFeed(box);
    }

    if (ev.type === 'prior_knowledge') {
      const el = document.createElement('div');
      if (ev.found) {
        el.className = 'info-box knowledge-found';
        const bodyId = 'kb-' + id;
        el.innerHTML = '<div class="title"><i class="ti ti-database"></i> Prior research found</div>' +
          `<div class="body" id="${bodyId}">${escHtml(ev.summary)}</div>` +
          `<span class="toggle-expand" onclick="const b=document.getElementById('${bodyId}');b.classList.toggle('expanded');this.textContent=b.classList.contains('expanded')?'Show less':'Show more'">Show more</span>`;
      } else {
        el.className = 'step knowledge-empty';
        el.innerHTML = '<div class="icon knowledge"><i class="ti ti-database"></i></div>' +
          '<div class="label">Knowledge graph <span class="kb-hint">- no prior research. Findings will be saved for future sessions.</span></div>';
      }
      appendToFeed(el);
    }

    if (ev.type === 'indexed') {
      const el = document.createElement('div');
      el.className = 'step';
      el.innerHTML = '<div class="icon knowledge"><i class="ti ti-database-plus"></i></div><div class="label">Report saved to knowledge graph</div>';
      appendToFeed(el);
    }

    if (ev.type === 'plan') {
      const box = document.createElement('div');
      box.className = 'info-box';
      box.innerHTML = '<div class="title"><i class="ti ti-list-check"></i> Research Plan</div>' + md(ev.content);
      appendToFeed(box);
    }

    if (ev.type === 'thinking') {
      setStatus(`Thinking... (round ${ev.iteration})`);
    }

    if (ev.type === 'tool_call') {
      const meta = TOOL_META[ev.tool] || { ti: 'ti-help', cls: 'think' };
      const name = ev.tool.replace(/_/g, ' ');
      const el = document.createElement('div');
      el.className = 'step';
      el.innerHTML = `<div class="icon ${meta.cls}"><i class="ti ${meta.ti}"></i></div><div class="label"><strong>${name}</strong> ${escHtml(ev.label)}</div>`;
      appendToFeed(el);
      if (activeTabId === id) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    if (ev.type === 'media' && ev.items && ev.items.length) {
      const labels = { images: 'Images', videos: 'Videos', news: 'News', docs: 'Documents', social: 'Social' };
      const icons = { images: 'ti-photo', videos: 'ti-player-play', news: 'ti-news', docs: 'ti-file-text', social: 'ti-brand-twitter' };
      const label = document.createElement('div');
      label.className = 'media-section-label';
      label.innerHTML = `<i class="ti ${icons[ev.kind] || 'ti-file'}"></i> ${labels[ev.kind] || ev.kind} (${ev.items.length})`;
      appendToFeed(label);

      const strip = document.createElement('div');
      strip.className = `media-strip ${ev.kind}-strip`;
      ev.items.forEach(item => {
        const url = safeUrl(item.url || item.img_src);
        const title = item.title || '';
        const thumb = safeUrl(item.thumbnail || item.img_src || url);
        const source = item.source || item.domain || '';
        const date = item.date || '';
        const duration = item.duration || '';
        if (!url) return;

        const card = document.createElement('div');
        card.className = 'media-card';

        if (ev.kind === 'images') {
          card.innerHTML = `
            <div class="media-thumb" data-url="${escHtml(url)}" data-source="${escHtml(url)}">
              <img src="${escHtml(thumb)}" alt="${escHtml(title)}" loading="lazy" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%23f5f3eb%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2255%22 text-anchor=%22middle%22 fill=%22%236b6b80%22 font-size=%2212%22>No preview</text></svg>'">
              ${source ? `<span class="source-badge">${escHtml(source)}</span>` : ''}
              <div class="media-actions">
                <span class="act-btn" title="View full size" data-action="lightbox" data-img="${escHtml(url)}" data-source="${escHtml(url)}"><i class="ti ti-arrows-maximize"></i></span>
                <span class="act-btn" title="Download" data-action="download" data-url="${escHtml(url)}" data-name="${escHtml(title || 'image')}"><i class="ti ti-download"></i></span>
                <span class="act-btn" title="Copy URL" data-action="copy" data-url="${escHtml(url)}"><i class="ti ti-link"></i></span>
              </div>
            </div>
            <div class="media-title">${escHtml(title)}</div>`;
        } else if (ev.kind === 'videos') {
          card.innerHTML = `
            <div class="media-thumb" data-action="open" data-url="${escHtml(url)}">
              <img src="${escHtml(thumb)}" alt="${escHtml(title)}" loading="lazy" onerror="this.style.display='none'">
              ${source ? `<span class="source-badge">${escHtml(source)}</span>` : ''}
              ${duration ? `<span class="badge">${escHtml(duration)}</span>` : ''}
              <div class="media-actions">
                <span class="act-btn" title="Open video" data-action="open" data-url="${escHtml(url)}"><i class="ti ti-player-play"></i></span>
                <span class="act-btn" title="Copy URL" data-action="copy" data-url="${escHtml(url)}"><i class="ti ti-link"></i></span>
              </div>
            </div>
            <div class="media-title">${escHtml(title)}</div>
            ${date ? `<div class="media-date">${escHtml(date)}</div>` : ''}`;
        } else {
          card.innerHTML = `
            <div class="media-title" style="cursor:pointer" data-action="open" data-url="${escHtml(url)}"><strong>${escHtml(title)}</strong></div>
            ${source || date ? `<div class="media-date">${escHtml([source, date].filter(Boolean).join(' · '))}</div>` : ''}`;
        }
        strip.appendChild(card);
      });

      // Wire up action buttons
      strip.querySelectorAll('[data-action]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const action = btn.dataset.action;
          if (action === 'lightbox') openLightbox(btn.dataset.img, btn.dataset.source);
          if (action === 'download') downloadUrl(btn.dataset.url, btn.dataset.name);
          if (action === 'copy') copyToClipboard(btn.dataset.url);
          if (action === 'open') window.open(safeUrl(btn.dataset.url), '_blank', 'noopener');
        });
      });

      appendToFeed(strip);
      if (activeTabId === id) strip.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    if (ev.type === 'video_dossiers' && ev.items && ev.items.length) {
      const label = document.createElement('div');
      label.className = 'media-section-label';
      label.innerHTML = `<i class="ti ti-file-analytics"></i> Video evidence dossiers (${ev.items.length})`;
      appendToFeed(label);

      const list = document.createElement('div');
      list.className = 'dossier-list';
      ev.items.forEach((dossier, idx) => {
        const card = document.createElement('div');
        card.className = 'dossier-card';
        const meta = [dossier.source, dossier.date, dossier.duration].filter(Boolean).join(' · ');
        const transcript = dossier.transcript || dossier.transcript_error || 'Transcript unavailable';
        const pivots = dossier.verification_pivots || {};
        const dossierUrl = safeUrl(dossier.url);
        const reverseUrl = safeUrl(pivots.reverse_image_search);
        card.innerHTML = `
          <div class="dossier-head">
            <div class="dossier-icon"><i class="ti ti-player-play"></i></div>
            <div>
              <div class="dossier-title">${escHtml(dossier.title || dossier.url || 'Video dossier')}</div>
              ${meta ? `<div class="dossier-meta">${escHtml(meta)}</div>` : ''}
            </div>
          </div>
          <div class="dossier-transcript">${escHtml(firstTranscriptLines(transcript, 5))}</div>
          <div class="dossier-actions">
            ${dossierUrl ? `<a href="${escHtml(dossierUrl)}" target="_blank" rel="noopener"><i class="ti ti-external-link"></i> Open</a>` : ''}
            ${reverseUrl ? `<a href="${escHtml(reverseUrl)}" target="_blank" rel="noopener"><i class="ti ti-search"></i> Reverse image</a>` : ''}
            <button type="button" data-dossier-index="${idx}"><i class="ti ti-download"></i> Evidence JSON</button>
          </div>
        `;
        card.querySelector('button')?.addEventListener('click', () => {
          downloadJson(dossier, `${dossier.video_id || 'video'}-evidence.json`);
        });
        list.appendChild(card);
      });
      appendToFeed(list);
      if (activeTabId === id) list.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    if (ev.type === 'tool_error') {
      const el = document.createElement('div');
      el.className = 'step';
      el.innerHTML = '<div class="icon err"><i class="ti ti-alert-triangle"></i></div><div class="label"><strong>Error</strong> ' + escHtml(ev.error) + '</div>';
      appendToFeed(el);
    }

    if (ev.type === 'error') {
      const statusEl = $(`#status-${id}`);
      if (statusEl) {
        statusEl.classList.add('error');
        setStatus(ev.message);
      }
      stopLiveTimer(tab);
      updateTabStatus(id, 'error');
    }

    if (ev.type === 'report') {
      const statusEl = $(`#status-${id}`);
      if (statusEl) setStatus('Report ready. Saving session...');
      tab.reportMd = ev.content;
      tab.gotReport = true;
      const panel = $(`#panel-${id}`);
      if (!panel) return;

      const div = document.createElement('div');
      div.className = 'report';
      div.innerHTML = md(ev.content);
      enhanceReportImages(div);
      panel.appendChild(div);

      const bar = document.createElement('div');
      bar.className = 'download-bar';
      const dlBtn = document.createElement('button');
      dlBtn.className = 'download-btn';
      dlBtn.innerHTML = '<i class="ti ti-download"></i> Markdown';
      dlBtn.addEventListener('click', () => {
        const blob = new Blob([tab.reportMd], { type: 'text/markdown' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'research-report.md';
        a.click();
      });
      bar.appendChild(dlBtn);
      panel.appendChild(bar);

      if (activeTabId === id) div.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    if (ev.type === 'saved' && ev.session_id) {
      tab.sessionId = ev.session_id;
      // Push to browser history so this session is bookmarkable/shareable
      history.pushState({ tabId: id, sessionId: ev.session_id }, '', `/research/${ev.session_id}`);
      saveTabs();
    }

    if (ev.type === 'done') {
      tab.gotReport = true;
      const statusEl = $(`#status-${id}`);
      if (statusEl) statusEl.remove();
      stopLiveTimer(tab);
      updateTabStatus(id, 'done');
      saveTabs();
    }

    if (ev.type === 'stopped') {
      tab.stopped = true;
      const statusEl = $(`#status-${id}`);
      if (statusEl) {
        statusEl.classList.add('stopped');
        setStatus('Stopped by user');
      }
      stopLiveTimer(tab);
      updateTabStatus(id, 'stopped');
    }
  };

  ws.onerror = () => {
    const statusEl = $(`#status-${id}`);
    if (statusEl) {
      statusEl.classList.add('error');
      setStatus('Could not connect to server');
    }
    stopLiveTimer(tab);
    updateTabStatus(id, 'error');
  };

  ws.onclose = () => {
    // A stopped session is terminal; never overwrite it with the connection-lost error
    if (tab.stopped || tabs.find(t => t.id === id)?.status !== 'running') return;
    stopLiveTimer(tab);
    const statusEl = $(`#status-${id}`);
    if (tab.gotReport) {
      if (statusEl) statusEl.remove();
      updateTabStatus(id, 'done');
    } else {
      if (statusEl) {
        statusEl.classList.add('error');
        setStatus('Connection lost');
      }
      const el = document.createElement('div');
      el.className = 'step';
      el.innerHTML = '<div class="icon err"><i class="ti ti-alert-triangle"></i></div><div class="label"><strong>Error</strong> Connection lost before the report arrived. Try running the query again.</div>';
      appendToFeed(el);
      updateTabStatus(id, 'error');
    }
  };

  queryEl.value = '';
  queryEl.focus();
}

// --- Markdown renderer ---
// Configure marked for research reports
marked.setOptions({
  gfm: true,
  breaks: true,
});
const renderer = new marked.Renderer();
renderer.link = ({ href, text }) => {
  const url = safeUrl(href);
  return url ? `<a href="${escHtml(url)}" target="_blank" rel="noopener">${text}</a>` : text;
};
renderer.image = ({ href, text }) => {
  const url = safeUrl(href);
  return url ? `<img src="${escHtml(url)}" alt="${escHtml(text || '')}" loading="lazy">` : '';
};
marked.use({ renderer });

function md(text) {
  // ADD_ATTR keeps target=_blank from the custom link renderer (DOMPurify strips it by default)
  return DOMPurify.sanitize(marked.parse(text || ''), { ADD_ATTR: ['target'] });
}

function enhanceReportImages(report) {
  report.querySelectorAll('img').forEach((img) => {
    if (img.closest('.report-image')) return;
    const src = img.currentSrc || img.src || img.getAttribute('src');
    if (!src) return;
    const name = img.alt || 'research-image';
    const wrapper = document.createElement('span');
    wrapper.className = 'report-image';
    img.replaceWith(wrapper);
    wrapper.appendChild(img);
    const actions = document.createElement('span');
    actions.className = 'media-actions';
    actions.innerHTML = `
      <button class="act-btn" type="button" title="View full size" data-action="lightbox"><i class="ti ti-arrows-maximize"></i></button>
      <button class="act-btn" type="button" title="Download" data-action="download"><i class="ti ti-download"></i></button>
      <button class="act-btn" type="button" title="Copy URL" data-action="copy"><i class="ti ti-link"></i></button>
    `;
    actions.querySelector('[data-action="lightbox"]').addEventListener('click', () => openLightbox(src, src));
    actions.querySelector('[data-action="download"]').addEventListener('click', () => downloadUrl(src, name));
    actions.querySelector('[data-action="copy"]').addEventListener('click', () => copyToClipboard(src));
    wrapper.appendChild(actions);
  });
}

function escHtml(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function safeUrl(u) {
  u = String(u || '').trim();
  return /^https?:/i.test(u) ? u : '';
}

function getConfig() {
  const sources = {};
  document.querySelectorAll('.chip').forEach(c => {
    sources[c.dataset.tool] = c.classList.contains('active');
  });
  return { sources, model: $('#model-select').value };
}

// Toggle chips
document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => chip.classList.toggle('active'));
});

btn.addEventListener('click', go);
queryEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); go(); }
});

// --- Lightbox ---
const lightbox = $('#lightbox');
const lbImg = $('#lb-img');
let lbSourceUrl = '';

function openLightbox(imgUrl, sourceUrl) {
  lbImg.src = imgUrl;
  lbSourceUrl = sourceUrl || imgUrl;
  lightbox.classList.add('open');
}
lightbox.addEventListener('click', (e) => {
  if (e.target === lightbox) lightbox.classList.remove('open');
});
$('#lb-download').addEventListener('click', (e) => { e.stopPropagation(); downloadUrl(lbImg.src, 'research-image'); });
$('#lb-copy').addEventListener('click', (e) => { e.stopPropagation(); copyToClipboard(lbImg.src); });
$('#lb-open').addEventListener('click', (e) => { e.stopPropagation(); window.open(lbSourceUrl, '_blank'); });
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') lightbox.classList.remove('open'); });

// --- Download ---
function downloadUrl(url, name) {
  const a = document.createElement('a');
  a.href = url;
  a.download = name || 'download';
  a.target = '_blank';
  a.rel = 'noopener';
  a.click();
}

function downloadJson(data, name) {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name || 'evidence.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

function firstTranscriptLines(text, maxLines) {
  return String(text || '')
    .split('\n')
    .filter(Boolean)
    .slice(0, maxLines)
    .join('\n');
}

// --- Toast ---
function showToast(msg, ms = 1500) {
  const toast = $('#copy-toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), ms);
}

// --- Copy to clipboard ---
function copyToClipboard(text) {
  navigator.clipboard.writeText(text).then(() => showToast('Copied to clipboard'));
}

// --- URL routing & tab persistence ---
function saveTabs() {
  const data = tabs
    .filter(t => t.sessionId)
    .map(t => ({ sessionId: t.sessionId, query: t.query }));
  sessionStorage.setItem('openTabs', JSON.stringify(data));
  sessionStorage.setItem('activeSessionId', tabs.find(t => t.id === activeTabId)?.sessionId || '');
}

async function restoreTabs() {
  // Read before restoring: createTab -> saveTabs() overwrites activeSessionId mid-loop
  const activeId = Number(sessionStorage.getItem('activeSessionId'));

  // Restore saved tabs from sessionStorage first
  const saved = sessionStorage.getItem('openTabs');
  if (saved) {
    try {
      const data = JSON.parse(saved);
      for (const item of data) {
        await openHistorySession(item.sessionId, { silent: true });
      }
    } catch (e) {
      console.error('Tab restore failed', e);
    }
  }

  // /research/:id opens/activates the requested session (dedupes if already restored)
  const match = location.pathname.match(/^\/research\/(\d+)$/);
  if (match) {
    await openHistorySession(Number(match[1]));
    return;
  }

  // At '/': switch to previously active tab, or show home if nothing restored
  const t = tabs.find(t => t.sessionId === activeId);
  if (t) {
    switchTab(t.id);
  } else if (!tabs.length) {
    showHome();
  }
}

// Browser back/forward
window.addEventListener('popstate', (e) => {
  if (location.pathname === '/') {
    showHome();
    return;
  }
  if (e.state && e.state.sessionId) {
    const tab = tabs.find(t => t.sessionId === e.state.sessionId);
    if (tab) {
      activeTabId = tab.id;
      panels.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      const target = $(`#panel-${tab.id}`);
      if (target) target.classList.add('active');
      renderTabs();
    } else {
      openHistorySession(e.state.sessionId);
    }
  } else if (e.state && e.state.tabId) {
    const tab = tabs.find(t => t.id === e.state.tabId);
    if (tab) switchTab(tab.id);
  } else {
    // Back to home
    if (tabs.length) {
      activeTabId = tabs[0].id;
      panels.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      $(`#panel-${activeTabId}`)?.classList.add('active');
      renderTabs();
    }
  }
});

// Restore on load
restoreTabs();

$('#home-link').addEventListener('click', (e) => {
  e.preventDefault();
  // Explicit home click is the only path that discards saved tabs
  sessionStorage.removeItem('openTabs');
  sessionStorage.removeItem('activeSessionId');
  showHome({ push: true });
});

// --- History drawer ---
const drawerOverlay = $('#drawer-overlay');
const historyList = $('#history-list');

$('#history-btn').addEventListener('click', () => {
  drawerOverlay.classList.add('open');
  loadHistory();
});
$('#drawer-close').addEventListener('click', () => drawerOverlay.classList.remove('open'));
drawerOverlay.addEventListener('click', (e) => {
  if (e.target === drawerOverlay) drawerOverlay.classList.remove('open');
});

async function loadHistory() {
  try {
    const res = await fetch('/api/history');
    const sessions = await res.json();
    if (!sessions.length) {
      historyList.innerHTML = '<div class="drawer-empty">No research sessions yet</div>';
      return;
    }
    historyList.innerHTML = sessions.map(s => {
      const date = new Date(s.created_at).toLocaleDateString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
      const model = (s.model || '').split('/').pop() || '';
      return `<div class="history-item" data-id="${s.id}">
        <div class="h-query">${escHtml(s.query)}</div>
        <div class="h-meta">
          <span>${date}</span>
          ${model ? `<span>${escHtml(model)}</span>` : ''}
          <button class="h-delete" data-id="${s.id}" title="Delete">&times;</button>
        </div>
      </div>`;
    }).join('');

    historyList.querySelectorAll('.history-item').forEach(item => {
      item.addEventListener('click', (e) => {
        if (e.target.classList.contains('h-delete')) return;
        openHistorySession(Number(item.dataset.id));
      });
    });
    historyList.querySelectorAll('.h-delete').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const id = Number(btn.dataset.id);
        await fetch(`/api/history/${id}`, { method: 'DELETE' });
        loadHistory();
      });
    });
  } catch (err) {
    historyList.innerHTML = '<div class="drawer-empty">Could not load history</div>';
  }
}

async function openHistorySession(id, opts = {}) {
  // Don't reopen if already in a tab
  const existing = tabs.find(t => t.sessionId === id);
  if (existing) {
    switchTab(existing.id);
    if (!opts.silent) drawerOverlay.classList.remove('open');
    return;
  }

  try {
    const res = await fetch(`/api/history/${id}`);
    const session = res.ok ? await res.json() : null;
    if (!session || session.error || !session.report) {
      if (!opts.silent) showToast('Session not found', 2500);
      return;
    }

    if (!opts.silent) drawerOverlay.classList.remove('open');

    const tab = createTab(session.query, { status: 'done', sessionId: id, skipStatus: true });
    tab.reportMd = session.report;

    const panel = $(`#panel-${tab.id}`);
    if (!panel) return;

    const div = document.createElement('div');
    div.className = 'report';
    div.innerHTML = md(session.report);
    enhanceReportImages(div);
    panel.appendChild(div);

    const bar = document.createElement('div');
    bar.className = 'download-bar';
    const dlBtn = document.createElement('button');
    dlBtn.className = 'download-btn';
    dlBtn.innerHTML = '<i class="ti ti-download"></i> Markdown';
    dlBtn.addEventListener('click', () => {
      const blob = new Blob([tab.reportMd], { type: 'text/markdown' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'research-report.md';
      a.click();
    });
    bar.appendChild(dlBtn);
    panel.appendChild(bar);

    updateTabStatus(tab.id, 'done');
  } catch (err) {
    console.error('Failed to load session', err);
    if (!opts.silent) showToast('Could not load session', 2500);
  }
}
