<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Research Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f0eee6;
    --surface: #fffdf7;
    --surface2: #f5f3eb;
    --border: #1a1a2e;
    --border-light: #d4d0c8;
    --text: #1a1a2e;
    --text2: #6b6b80;
    --accent: #5046e5;
    --accent-bg: #ede9fe;
    --green: #059669;
    --green-bg: #d1fae5;
    --amber: #d97706;
    --amber-bg: #fef3c7;
    --red: #dc2626;
    --red-bg: #fee2e2;
    --blue: #2563eb;
    --blue-bg: #dbeafe;
    --pink: #db2777;
    --pink-bg: #fce7f3;
    --cyan: #0891b2;
    --cyan-bg: #cffafe;
    --violet: #7c3aed;
    --violet-bg: #ede9fe;
    --font-heading: 'Space Grotesk', sans-serif;
    --font-body: 'Inter', system-ui, sans-serif;
    --radius: 12px;
    --shadow: 3px 3px 0 var(--border);
    --shadow-sm: 2px 2px 0 var(--border);
  }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 16px 24px;
    border-bottom: 2px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface);
  }
  header .logo {
    width: 36px; height: 36px;
    background: var(--accent);
    border: 2px solid var(--border);
    border-radius: 10px;
    box-shadow: var(--shadow-sm);
    display: grid; place-items: center;
    color: #fff;
    font-size: 18px;
  }
  header h1 {
    font-family: var(--font-heading);
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  header .tag {
    font-family: var(--font-body);
    font-size: 11px;
    font-weight: 500;
    color: var(--accent);
    background: var(--accent-bg);
    padding: 4px 10px;
    border-radius: 20px;
    border: 1.5px solid var(--accent);
    margin-left: auto;
  }

  main {
    flex: 1;
    max-width: 880px;
    width: 100%;
    margin: 0 auto;
    padding: 32px 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* Search bar */
  .search-box { position: relative; }
  .search-box textarea {
    width: 100%;
    min-height: 64px;
    max-height: 200px;
    padding: 18px 60px 18px 20px;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    color: var(--text);
    font-size: 15px;
    font-family: var(--font-body);
    line-height: 1.5;
    resize: vertical;
    outline: none;
    transition: box-shadow 0.15s, transform 0.15s;
  }
  .search-box textarea:focus {
    box-shadow: 4px 4px 0 var(--accent);
    transform: translate(-1px, -1px);
  }
  .search-box textarea::placeholder { color: var(--text2); }
  .search-box button {
    position: absolute;
    right: 12px;
    bottom: 14px;
    width: 40px; height: 40px;
    background: var(--accent);
    border: 2px solid var(--border);
    border-radius: 10px;
    box-shadow: var(--shadow-sm);
    color: #fff;
    cursor: pointer;
    display: grid; place-items: center;
    transition: all 0.1s;
    font-size: 20px;
  }
  .search-box button:hover:not(:disabled) {
    transform: translate(-1px, -1px);
    box-shadow: 3px 3px 0 var(--border);
  }
  .search-box button:active:not(:disabled) {
    transform: translate(1px, 1px);
    box-shadow: 0 0 0 var(--border);
  }
  .search-box button:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Activity feed */
  .feed { display: flex; flex-direction: column; gap: 6px; }

  .step {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    background: var(--surface);
    border: 1.5px solid var(--border-light);
    border-radius: 10px;
    font-size: 13px;
    color: var(--text2);
    animation: fadeIn 0.2s ease;
  }
  .step .icon {
    width: 28px; height: 28px; flex-shrink: 0;
    border-radius: 8px;
    border: 1.5px solid transparent;
    display: grid; place-items: center;
    font-size: 16px;
  }
  .step .icon.research   { background: var(--accent-bg); color: var(--accent); border-color: var(--accent); }
  .step .icon.images     { background: var(--pink-bg); color: var(--pink); border-color: var(--pink); }
  .step .icon.videos     { background: var(--red-bg); color: var(--red); border-color: var(--red); }
  .step .icon.news       { background: var(--amber-bg); color: var(--amber); border-color: var(--amber); }
  .step .icon.docs       { background: var(--cyan-bg); color: var(--cyan); border-color: var(--cyan); }
  .step .icon.read       { background: var(--green-bg); color: var(--green); border-color: var(--green); }
  .step .icon.transcript { background: var(--blue-bg); color: var(--blue); border-color: var(--blue); }
  .step .icon.social     { background: var(--violet-bg); color: var(--violet); border-color: var(--violet); }
  .step .icon.think      { background: var(--surface2); color: var(--text2); border-color: var(--border-light); }
  .step .icon.err        { background: var(--red-bg); color: var(--red); border-color: var(--red); }
  .step .label { flex: 1; line-height: 1.5; word-break: break-word; }
  .step .label strong { color: var(--text); font-weight: 600; }

  /* Spinner */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 16px; height: 16px;
    border: 2.5px solid var(--border-light);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: inline-block;
  }

  /* Report */
  .report {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 32px;
    font-size: 14.5px;
    line-height: 1.75;
    animation: fadeIn 0.3s ease;
  }
  .report h1, .report h2, .report h3, .report h4 {
    font-family: var(--font-heading);
    color: var(--text);
    margin: 24px 0 10px;
    line-height: 1.3;
    letter-spacing: -0.01em;
  }
  .report h1:first-child, .report h2:first-child, .report h3:first-child { margin-top: 0; }
  .report h1 { font-size: 22px; }
  .report h2 {
    font-size: 17px;
    padding-bottom: 6px;
    border-bottom: 2px solid var(--border);
    margin-bottom: 12px;
  }
  .report h3 { font-size: 15px; }
  .report p { margin: 8px 0; color: var(--text); }
  .report ul, .report ol { padding-left: 20px; margin: 8px 0; }
  .report li { margin: 5px 0; color: var(--text); }
  .report a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color 0.15s;
  }
  .report a:hover { border-bottom-color: var(--accent); }
  .report strong { color: var(--text); font-weight: 600; }
  .report hr {
    border: none;
    border-top: 2px solid var(--border);
    margin: 24px 0;
  }
  .report code {
    background: var(--surface2);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 13px;
    border: 1px solid var(--border-light);
  }
  .report blockquote {
    border-left: 3px solid var(--accent);
    padding-left: 16px;
    margin: 14px 0;
    color: var(--text2);
    font-style: italic;
  }
  .report img {
    max-width: 100%;
    border-radius: 10px;
    border: 2px solid var(--border);
    margin: 10px 0;
  }

  /* Toggles */
  .toggles {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
  }
  .toggles label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text2);
    margin-right: 4px;
  }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 5px 12px;
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 500;
    color: var(--text2);
    background: var(--surface);
    border: 1.5px solid var(--border-light);
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }
  .chip:hover { border-color: var(--text2); }
  .chip.active {
    color: var(--accent);
    background: var(--accent-bg);
    border-color: var(--accent);
  }
  .chip i { font-size: 14px; }
  .toggles select {
    padding: 5px 10px;
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 500;
    background: var(--surface);
    border: 1.5px solid var(--border-light);
    border-radius: 8px;
    color: var(--text);
    cursor: pointer;
    outline: none;
  }
  .toggles select:focus { border-color: var(--accent); }
  .sep { width: 1px; height: 20px; background: var(--border-light); margin: 0 4px; }

  /* Plan & followups */
  .plan-box, .followups-box {
    background: var(--surface);
    border: 1.5px solid var(--border-light);
    border-radius: 10px;
    padding: 14px 18px;
    font-size: 13px;
    line-height: 1.7;
    animation: fadeIn 0.2s ease;
  }
  .plan-box .title, .followups-box .title {
    font-family: var(--font-heading);
    font-weight: 700;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text2);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .followups-box .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .followups-box .q-chip {
    font-size: 12px;
    padding: 5px 12px;
    background: var(--accent-bg);
    color: var(--accent);
    border: 1.5px solid var(--accent);
    border-radius: 20px;
    cursor: default;
  }

  /* Download button */
  .download-bar {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: -8px;
  }
  .download-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 6px 14px;
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    box-shadow: var(--shadow-sm);
    cursor: pointer;
    transition: all 0.1s;
  }
  .download-btn:hover {
    transform: translate(-1px, -1px);
    box-shadow: 3px 3px 0 var(--border);
  }
  .download-btn i { font-size: 14px; }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--text2);
    font-size: 14px;
    line-height: 1.8;
  }
  .empty .icon-big {
    font-size: 48px;
    color: var(--accent);
    margin-bottom: 16px;
  }
  .empty p { margin: 4px 0; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  @media (max-width: 640px) {
    main { padding: 16px; }
    .report { padding: 20px; }
    .search-box textarea { font-size: 14px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo"><i class="ti ti-brain"></i></div>
  <h1>Research Agent</h1>
  <span class="tag" id="model-tag">ready</span>
</header>

<main>
  <div class="search-box">
    <textarea id="query" rows="2" placeholder="What do you want to research?"></textarea>
    <button id="go" aria-label="Run research"><i class="ti ti-arrow-right"></i></button>
  </div>

  <div class="toggles">
    <label>Sources:</label>
    <span class="chip active" data-tool="images"><i class="ti ti-photo"></i> Images</span>
    <span class="chip active" data-tool="videos"><i class="ti ti-player-play"></i> Videos</span>
    <span class="chip active" data-tool="news"><i class="ti ti-news"></i> News</span>
    <span class="chip active" data-tool="docs"><i class="ti ti-file-text"></i> Documents</span>
    <span class="chip" data-tool="social"><i class="ti ti-brand-twitter"></i> Social</span>
    <div class="sep"></div>
    <select id="model-select">
      <option value="deepseek/deepseek-chat">DeepSeek V3</option>
      <option value="google/gemini-2.5-flash">Gemini Flash</option>
      <option value="anthropic/claude-haiku-4-5-20251001">Claude Haiku</option>
    </select>
  </div>

  <div id="output">
    <div class="empty">
      <div class="icon-big"><i class="ti ti-world-search"></i></div>
      <p><strong>Multi-source AI research</strong></p>
      <p>Web, images, videos, news, documents, social media</p>
    </div>
  </div>
</main>

<script>
const $ = s => document.querySelector(s);
const query = $('#query');
const btn = $('#go');
const output = $('#output');
const modelTag = $('#model-tag');

const TOOL_META = {
  web_research:         { icon: 'ti-search',          cls: 'research' },
  search_images:        { icon: 'ti-photo',            cls: 'images' },
  search_videos:        { icon: 'ti-player-play',      cls: 'videos' },
  search_news:          { icon: 'ti-news',             cls: 'news' },
  search_documents:     { icon: 'ti-file-text',        cls: 'docs' },
  read_page:            { icon: 'ti-book',             cls: 'read' },
  get_video_transcript: { icon: 'ti-message-language', cls: 'transcript' },
  search_social:        { icon: 'ti-brand-twitter',    cls: 'social' },
};

function md(text) {
  // Normalize line endings
  text = text.replace(/\r\n/g, '\n');

  // Extract code blocks first to protect them
  const codeBlocks = [];
  text = text.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
    codeBlocks.push(`<pre><code>${escHtml(code.trim())}</code></pre>`);
    return `%%CODE_BLOCK_${codeBlocks.length - 1}%%`;
  });

  let html = text
    // headings (with optional ** wrapping)
    .replace(/^#{4}\s+\*{0,2}(.+?)\*{0,2}\s*$/gm, '<h4>$1</h4>')
    .replace(/^#{3}\s+\*{0,2}(.+?)\*{0,2}\s*$/gm, '<h3>$1</h3>')
    .replace(/^#{2}\s+\*{0,2}(.+?)\*{0,2}\s*$/gm, '<h2>$1</h2>')
    .replace(/^#{1}\s+\*{0,2}(.+?)\*{0,2}\s*$/gm, '<h1>$1</h1>')
    // hr
    .replace(/^---+$/gm, '<hr>')
    // bold (handle ** and __)
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/__(.+?)__/g, '<strong>$1</strong>')
    // italic
    .replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>')
    // images
    .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img alt="$1" src="$2" loading="lazy">')
    // links
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
    // inline code
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    // blockquote
    .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
    // unordered list (handle -, *, +)
    .replace(/^[\-\*\+]\s+(.+)$/gm, '<li>$1</li>')
    // ordered list
    .replace(/^\d+[\.\)]\s+(.+)$/gm, '<li>$1</li>');

  // Wrap consecutive <li> in <ul>
  html = html.replace(/((?:<li>[\s\S]*?<\/li>\s*)+)/g, '<ul>$1</ul>');

  // Wrap remaining plain lines in <p>, skip empty and already-wrapped
  html = html.split('\n').map(line => {
    const t = line.trim();
    if (!t) return '';
    if (/^<[hupob]|^<li|^<hr|^<pre|^<img|^<ul|^<block|^%%CODE/i.test(t)) return line;
    return `<p>${t}</p>`;
  }).join('\n');

  // Restore code blocks
  codeBlocks.forEach((block, i) => {
    html = html.replace(`<p>%%CODE_BLOCK_${i}%%</p>`, block);
    html = html.replace(`%%CODE_BLOCK_${i}%%`, block);
  });

  // Bare image URLs as img tags
  html = html.replace(
    /<p>(https?:\/\/[^\s<]+\.(?:jpg|jpeg|png|gif|webp|svg)(?:\?[^\s<]*)?)<\/p>/gi,
    '<img src="$1" loading="lazy">'
  );

  // Clean up empty paragraphs
  html = html.replace(/<p>\s*<\/p>/g, '');

  return html;
}

function go() {
  const q = query.value.trim();
  if (!q) return;
  btn.disabled = true;
  output.innerHTML = '';

  const status = document.createElement('div');
  status.className = 'step';
  status.innerHTML = '<div class="icon think"><span class="spinner"></span></div><div class="label">Connecting...</div>';
  output.appendChild(status);

  const feed = document.createElement('div');
  feed.className = 'feed';
  output.appendChild(feed);

  const setStatus = (text) => { status.querySelector('.label').textContent = text; };

  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const ws = new WebSocket(`${proto}://${location.host}/ws`);

  let reportMarkdown = '';

  ws.onopen = () => {
    ws.send(JSON.stringify({ query: q, config: getConfig() }));
    setStatus('Starting...');
  };

  ws.onmessage = (e) => {
    const ev = JSON.parse(e.data);

    if (ev.type === 'start') {
      modelTag.textContent = ev.model.split('/').pop();
    }

    if (ev.type === 'phase') {
      setStatus(ev.name);
    }

    if (ev.type === 'followups') {
      const box = document.createElement('div');
      box.className = 'followups-box';
      box.innerHTML = '<div class="title"><i class="ti ti-help-circle"></i> Suggested focus areas</div><div class="chips">' +
        ev.questions.map(q => `<span class="q-chip">${escHtml(q)}</span>`).join('') + '</div>';
      feed.appendChild(box);
    }

    if (ev.type === 'plan') {
      const box = document.createElement('div');
      box.className = 'plan-box';
      box.innerHTML = '<div class="title"><i class="ti ti-list-check"></i> Research Plan</div>' + md(ev.content);
      feed.appendChild(box);
    }

    if (ev.type === 'thinking') {
      setStatus(`Thinking... (round ${ev.iteration})`);
    }

    if (ev.type === 'tool_call') {
      const meta = TOOL_META[ev.tool] || { icon: 'ti-help', cls: 'think' };
      const name = ev.tool.replace(/_/g, ' ');
      const el = document.createElement('div');
      el.className = 'step';
      el.innerHTML = `<div class="icon ${meta.cls}"><i class="ti ${meta.icon}"></i></div><div class="label"><strong>${name}</strong> ${escHtml(ev.label)}</div>`;
      feed.appendChild(el);
      el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    if (ev.type === 'tool_error') {
      const el = document.createElement('div');
      el.className = 'step';
      el.innerHTML = '<div class="icon err"><i class="ti ti-alert-triangle"></i></div><div class="label"><strong>Error</strong> ' + escHtml(ev.error) + '</div>';
      feed.appendChild(el);
    }

    if (ev.type === 'error') {
      status.querySelector('.icon').innerHTML = '<i class="ti ti-alert-triangle"></i>';
      status.querySelector('.icon').className = 'icon err';
      setStatus(ev.message);
      btn.disabled = false;
    }

    if (ev.type === 'report') {
      status.remove();
      reportMarkdown = ev.content;
      const div = document.createElement('div');
      div.className = 'report';
      div.innerHTML = md(ev.content);
      output.appendChild(div);

      // Download bar
      const bar = document.createElement('div');
      bar.className = 'download-bar';
      bar.innerHTML = '<button class="download-btn" id="dl-md"><i class="ti ti-download"></i> Markdown</button>';
      output.appendChild(bar);
      document.getElementById('dl-md').addEventListener('click', () => {
        const blob = new Blob([reportMarkdown], { type: 'text/markdown' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'research-report.md';
        a.click();
      });

      div.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    if (ev.type === 'done') {
      status.remove();
      btn.disabled = false;
    }
  };

  ws.onerror = () => {
    status.querySelector('.icon').innerHTML = '<i class="ti ti-alert-triangle"></i>';
    status.querySelector('.icon').className = 'icon err';
    setStatus('Could not connect to server');
    btn.disabled = false;
  };

  ws.onclose = () => { btn.disabled = false; };
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// Toggle chips
document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => chip.classList.toggle('active'));
});

function getConfig() {
  const sources = {};
  document.querySelectorAll('.chip').forEach(c => {
    sources[c.dataset.tool] = c.classList.contains('active');
  });
  return {
    sources,
    model: $('#model-select').value,
  };
}

btn.addEventListener('click', go);
query.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); go(); }
});
</script>
</body>
</html>
